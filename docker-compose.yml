services:
  php:
    build:
      context: .
      dockerfile: php/Dockerfile
    container_name: faberlicai-php
    restart: unless-stopped
    working_dir: /var/www/html
    user: "${UID_HOST}:${GID_HOST}"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./src:/var/www/html
    networks:
      - app-network
    environment:
      - DB_HOST=mysql
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USER_NAME}
      - DB_PASSWORD=${DB_USER_PASSWORD}
      - UID_HOST=${UID_HOST}
      - GID_HOST=${GID_HOST}

  nginx:
    image: nginx:${NGINX_VERSION:-alpine}
    container_name: faberlicai-nginx
    restart: unless-stopped
    ports:
      - "${IP_HOST}:${NGINX_PORT}:80"
    environment:
      - NGINX_HOST=${NGINX_HOST}
      - NGINX_PORT=${NGINX_PORT}
      - PHP_FPM_HOST=${PHP_FPM_HOST}
      - PHP_FPM_PORT=${PHP_FPM_PORT}
    volumes:
      - ./src:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf.template
    depends_on:
      - php
    networks:
      - app-network
    command: >
      sh -c "
      envsubst '$$NGINX_HOST $$NGINX_PORT $$PHP_FPM_HOST $$PHP_FPM_PORT' 
      < /etc/nginx/conf.d/default.conf.template 
      > /etc/nginx/conf.d/default.conf 
      && nginx -g 'daemon off;'
      "

  mysql:
    image: mysql:8.0
    container_name: faberlicai-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USER_NAME}
      MYSQL_PASSWORD: ${DB_USER_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${IP_HOST}:${DB_PORT}:3306"
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}" ]
      interval: 5s
      timeout: 10s
      retries: 20

volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge